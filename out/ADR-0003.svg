<svg viewBox="0 0 920 660" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif">
  <rect width="920" height="660" fill="#faf9f7"/>
  <text x="40" y="48" font-size="13" fill="#9a8f80" letter-spacing="2">ADR-0003 · 設計判断の地図</text>
  <text x="40" y="80" font-size="24" font-weight="700" fill="#2a2a2a">ローカル常駐1プロセスに人間の窓(Webビュー)とAIの窓(MCP)を同居させる</text>
  <line x1="40" y1="98" x2="880" y2="98" stroke="#e5ddd2" stroke-width="1.5"/>
  <text x="40" y="128" font-size="13" fill="#7a7266" font-weight="600">CONTEXT</text>
  <text x="40" y="152" font-size="14" fill="#3a3a3a">drawzu の目的を「人間が図で見ているDBの姿と、AIがコードを書く時に前提にしている DBの姿を、同じ1個のモデルに揃えること」と定めた(2026-07-09の対話)。 この体験を成立させる実行形態(どこでプロセスが動くか)と、モデルの置き場所を決める。</text>
  <text x="40" y="212" font-size="13" fill="#7a7266" font-weight="600">DECISION MATRIX ─ 選択肢 × 評価軸</text>
    <text x="373" y="248" text-anchor="middle" font-size="12.5" fill="#5a5248">想定同期の即時性</text>
    <text x="518" y="248" text-anchor="middle" font-size="12.5" fill="#5a5248">導入の手軽さ</text>
    <text x="663" y="248" text-anchor="middle" font-size="12.5" fill="#5a5248">モデルとgit履歴の一体性</text>
    <text x="808" y="248" text-anchor="middle" font-size="12.5" fill="#5a5248">リモート展開余地</text>
  <rect x="40" y="300" width="840" height="70" rx="8" fill="#e3efe8" stroke="#2d6a4f" stroke-width="2"/>
    <rect x="40" y="300" width="6" height="70" rx="3" fill="#2d6a4f"/>
    <text x="60" y="332" font-size="15" font-weight="700" fill="#2d6a4f">選択肢 A ✓</text>
    <text x="60" y="352" font-size="11.5" fill="#4a7a60">ローカル常駐1プロセス(Webビュー+MCP同居) / モデルは対象リポジトリ内ファイル</text>
    <text x="373" y="342" text-anchor="middle" font-size="18" fill="#2d6a4f">◎</text>
    <text x="518" y="342" text-anchor="middle" font-size="18" fill="#2d6a4f">◎</text>
    <text x="663" y="342" text-anchor="middle" font-size="18" fill="#2d6a4f">◎</text>
    <text x="808" y="342" text-anchor="middle" font-size="18" fill="#3a8a63">◯</text>
  <rect x="40" y="380" width="840" height="70" rx="8" fill="#f2ede5"/>
    
    <text x="60" y="412" font-size="15" font-weight="700" fill="#8a8276">選択肢 B</text>
    <text x="60" y="432" font-size="11.5" fill="#9a8f80">リモートホスト(Vercel/Cloud Run等)で常時公開 / モデルはクラウドストレージ</text>
    <text x="373" y="422" text-anchor="middle" font-size="18" fill="#3a8a63">◯</text>
    <text x="518" y="422" text-anchor="middle" font-size="18" fill="#c25c4a">✕</text>
    <text x="663" y="422" text-anchor="middle" font-size="18" fill="#c25c4a">✕</text>
    <text x="808" y="422" text-anchor="middle" font-size="18" fill="#2d6a4f">◎</text>
  <rect x="40" y="460" width="840" height="70" rx="8" fill="#f2ede5"/>
    
    <text x="60" y="492" font-size="15" font-weight="700" fill="#8a8276">選択肢 C</text>
    <text x="60" y="512" font-size="11.5" fill="#9a8f80">自前ビューを作らず既存GUI(drawDB等)を窓として接続</text>
    <text x="373" y="502" text-anchor="middle" font-size="18" fill="#b06a4a">△</text>
    <text x="518" y="502" text-anchor="middle" font-size="18" fill="#b06a4a">△</text>
    <text x="663" y="502" text-anchor="middle" font-size="18" fill="#3a8a63">◯</text>
    <text x="808" y="502" text-anchor="middle" font-size="18" fill="#b06a4a">△</text>
  <text x="40" y="500" font-size="13" fill="#7a7266" font-weight="600">なぜこの決定か ─ 決め手：想定同期の即時性</text>
  <rect x="40" y="514" width="400" height="118" rx="8" fill="#fff" stroke="#e5ddd2"/>
  <text x="60" y="540" font-size="12.5" fill="#4a4a4a">対象プロジェクトのローカルで動く1つのNodeプロセスに、人間の窓(</text>
  <text x="60" y="560" font-size="12.5" fill="#4a4a4a">ブラウザのER図ビュー、 WebSocketでライブ同期)とAIの窓(M</text>
  <text x="60" y="580" font-size="12.5" fill="#4a4a4a">CP、get_model/patch_model)を同居させる。 モデル</text>
  <rect x="460" y="514" width="420" height="118" rx="8" fill="#fff" stroke="#e5ddd2"/>
  <text x="480" y="540" font-size="13" fill="#5a5248" font-weight="700">帰結 ─ 引き受けたトレードオフ</text>
  <text x="480" y="560" font-size="12.5" fill="#4a4a4a">・実装順は Phase 1(モデル+Webビューをローカルで動かす) → Phase 2(MCP化・stdio) → Phase 3(任意・リモート化)</text>
  <text x="480" y="580" font-size="12.5" fill="#4a4a4a">・コアは通信路(transport)非依存に書き、モデルの読み書きはストレージ層として1枚抽象化する(Phase 3を閉ざさないため)</text>
  <text x="480" y="600" font-size="12.5" fill="#4a4a4a">・ADR-0002 のMCPツール表から introspect を外す(AIが担うため専用ツール不要)</text>
  <text x="480" y="620" font-size="12.5" fill="#4a4a4a">・Webビューが見られるのはプロセスが生きている間だけ(Phase 2 以降、MCPサーバーとして Claude Code が spawn する形にすると、セッション終了と共に閉じる)</text>
</svg>